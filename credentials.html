<!DOCTYPE html>
<!--
  DEWI — credentials.html
  Paneel-/paginaversie van het Credentials-scherm. Zelfde conventie als agents.html / competition.html:
  - deelt de Supabase Auth-sessie met organisation.html (zelfde origin -> localStorage-sessie),
  - leest SUPABASE_URL + anon key uit dewi-config.js,
  - geen eigen loginformulier (organisation.html regelt de login).
  Data komt uit RPC public.get_credentials() (vergrendeld op info@homedecobali.com / service_role).
-->
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Credentials · DEWI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- DEWI-config: zelfde bestand dat organisation.html/agents.html/competition.html gebruiken -->
<script src="dewi-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0f14; --panel:#111823; --panel-2:#0e141d; --line:#1e2937;
    --ink:#e6edf3; --muted:#7d8da8;
    --accent:#5eb0ff; --ok:#3ecf8e; --warn:#f5a623; --dead:#e5484d;
    --chip:#16202e; --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  #creds{max-width:none;margin:0;padding:18px 18px 40px}

  .creds-head{display:flex;align-items:flex-end;justify-content:space-between;
    gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:16px}
  .creds-title{display:flex;align-items:center;gap:11px}
  .creds-title .lock{width:32px;height:32px;border-radius:9px;background:var(--chip);
    border:1px solid var(--line);display:grid;place-items:center;color:var(--accent)}
  .creds-title h1{margin:0;font-size:17px;font-weight:700;letter-spacing:-.01em}
  .creds-title .sub{color:var(--muted);font-size:12px;margin-top:2px}

  .tally{display:flex;gap:8px;flex-wrap:wrap}
  .stat{display:flex;align-items:baseline;gap:6px;background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12px}
  .stat b{font-family:'JetBrains Mono',monospace;font-size:13px}
  .stat.ok b{color:var(--ok)} .stat.warn b{color:var(--warn)} .stat.dead b{color:var(--dead)}
  .stat span{color:var(--muted)}

  .toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 12px}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--ink);font:inherit;padding:9px 0}
  .search svg{color:var(--muted);flex:none}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .filters button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:7px 13px;font:inherit;font-size:12px;cursor:pointer}
  .filters button:hover{color:var(--ink)}
  .filters button.on{color:var(--ink);border-color:#33445a;background:var(--chip)}

  .cat{margin:22px 0 9px;display:flex;align-items:center;gap:10px}
  .cat h2{margin:0;font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .cat .rule{flex:1;height:1px;background:var(--line)}
  .cat .n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

  .row{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 15px;margin-bottom:9px}
  .row.dead{opacity:.62}
  .row-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .row-name{min-width:0}
  .row-name .eyebrow{font-size:11px;color:var(--muted)}
  .row-name .key{font-weight:600;font-size:14px}
  .badge{flex:none;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:999px;
    border:1px solid transparent;font-family:'JetBrains Mono',monospace}
  .badge.active{color:var(--ok);background:rgba(62,207,142,.09);border-color:rgba(62,207,142,.25)}
  .badge.missing{color:var(--warn);background:rgba(245,166,35,.09);border-color:rgba(245,166,35,.25)}
  .badge.dead{color:var(--dead);background:rgba(229,72,77,.09);border-color:rgba(229,72,77,.25)}

  .secret{display:flex;align-items:center;gap:8px;margin-top:10px}
  .secret .val{flex:1;min-width:0;font-family:'JetBrains Mono',monospace;font-size:12px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#cbd5e1}
  .secret .val.masked{letter-spacing:2px;color:#5a6b82}
  .iconbtn{flex:none;background:var(--chip);border:1px solid var(--line);color:var(--muted);
    border-radius:8px;padding:8px 10px;font:inherit;font-size:12px;cursor:pointer;display:flex;gap:6px;align-items:center}
  .iconbtn:hover{color:var(--ink);border-color:#33445a}
  .iconbtn.copied{color:var(--ok);border-color:rgba(62,207,142,.4)}

  .missing-note{margin-top:10px;background:rgba(245,166,35,.06);border:1px dashed rgba(245,166,35,.3);
    border-radius:8px;padding:9px 11px;font-size:12px;color:#e9c07a}
  .meta{margin-top:9px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .meta .note{color:var(--muted);font-size:12px}
  .meta .find{font-size:12px;white-space:nowrap}

  .state{display:grid;place-items:center;min-height:60vh;text-align:center;color:var(--muted);padding:30px}
  .state .box{max-width:340px}
  .state h3{color:var(--ink);margin:0 0 6px;font-size:15px}
  .state a.btn{display:inline-block;margin-top:14px;background:var(--accent);color:#04121f;
    border-radius:9px;padding:9px 16px;font-weight:600}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}
</style>
</head>
<body>
<div id="app"><div class="state"><div class="box">Laden…</div></div></div>

<script>
// ---- Config uit dewi-config.js (zelfde als de andere DEWI-pagina's) ----
const CFG = window.DEWI_CONFIG || window.BRIDGE_CONFIG || {};
const SUPABASE_URL  = window.SUPABASE_URL || CFG.SUPABASE_URL;
const SUPABASE_ANON = window.SUPABASE_ANON_KEY || window.SUPABASE_ANON
                   || CFG.SUPABASE_ANON_KEY || CFG.SUPABASE_ANON;

const app = document.getElementById("app");

if(!SUPABASE_URL || !SUPABASE_ANON){
  app.innerHTML = `<div class="state"><div class="box"><h3>Config ontbreekt</h3>
    <p>dewi-config.js levert geen <code>SUPABASE_URL</code> / anon key onder de verwachte naam.
    Zet de variabelnamen hierboven gelijk aan wat dewi-config.js exporteert.</p></div></div>`;
  throw new Error("dewi-config.js: SUPABASE_URL/anon key niet gevonden");
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const CAT_ORDER = ["Login / SSO","AI & Media","Supabase","Shopify","Meta / Social","Cloudinary","Google","DEWI intern","Hosting / Dev"];
let ALL = [], q = "", statusFilter = "all";

function esc(s){return (s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function hostOf(u){ try{ return new URL(u).host.replace(/^www\./,""); }catch{ return u; } }

async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ renderLoggedOut(); return; }
  await load();
}
sb.auth.onAuthStateChange((_e, session)=>{ if(session) load(); else renderLoggedOut(); });

function renderLoggedOut(){
  app.innerHTML = `<div class="state"><div class="box">
    <h3>Niet ingelogd</h3>
    <p>Dit paneel deelt de login van DEWI. Log in op het hoofdscherm en dit paneel vult zich vanzelf.</p>
    <a class="btn" href="organisation.html" target="_top">Naar DEWI</a>
  </div></div>`;
}

async function load(){
  const { data, error } = await sb.rpc("get_credentials");
  if(error){ app.innerHTML = `<div id="creds"><div class="empty">Kon niet laden: ${esc(error.message)}</div></div>`; return; }
  ALL = data || [];
  render();
}

function render(){
  const counts = { active:0, missing:0, dead:0 };
  ALL.forEach(r=>counts[r.status]!==undefined && counts[r.status]++);

  const rows = ALL.filter(r=>{
    if(statusFilter!=="all" && r.status!==statusFilter) return false;
    if(!q) return true;
    return `${r.service} ${r.key_name} ${r.notes} ${r.category}`.toLowerCase().includes(q);
  });

  const cats = [...new Set(rows.map(r=>r.category))]
    .sort((a,b)=> (CAT_ORDER.indexOf(a)+1||99) - (CAT_ORDER.indexOf(b)+1||99));

  let body = rows.length ? "" : `<div class="empty">Niets gevonden.</div>`;
  for(const cat of cats){
    const items = rows.filter(r=>r.category===cat);
    body += `<div class="cat"><h2>${esc(cat)}</h2><div class="rule"></div><span class="n">${items.length}</span></div>`;
    for(const r of items) body += rowHTML(r);
  }

  app.innerHTML = `
    <div id="creds">
      <div class="creds-head">
        <div class="creds-title">
          <div class="lock">${lockSVG}</div>
          <div><h1>Credentials</h1><div class="sub">Live uit Supabase · alleen jouw DEWI-account</div></div>
        </div>
        <div class="tally">
          <div class="stat ok"><b>${counts.active}</b><span>actief</span></div>
          <div class="stat warn"><b>${counts.missing}</b><span>ontbreekt</span></div>
          <div class="stat dead"><b>${counts.dead}</b><span>dood</span></div>
        </div>
      </div>
      <div class="toolbar">
        <div class="search">${searchSVG}<input id="q" placeholder="Zoek op dienst, sleutel of notitie…" value="${esc(q)}"></div>
        <div class="filters">
          ${["all","active","missing","dead"].map(s=>`<button data-s="${s}" class="${statusFilter===s?'on':''}">${({all:'Alle',active:'Actief',missing:'Ontbreekt',dead:'Dood'})[s]}</button>`).join("")}
        </div>
      </div>
      ${body}
    </div>`;

  const qi = document.getElementById("q");
  qi.oninput = ()=>{ q = qi.value.trim().toLowerCase(); const p=qi.selectionStart; render(); const n=document.getElementById("q"); n.focus(); n.setSelectionRange(p,p); };
  document.querySelectorAll(".filters button").forEach(b=> b.onclick=()=>{ statusFilter=b.dataset.s; render(); });
  document.querySelectorAll("[data-copy]").forEach(bindCopy);
  document.querySelectorAll("[data-reveal]").forEach(bindReveal);
}

function rowHTML(r){
  const badge = `<span class="badge ${r.status==='active'?'active':r.status==='missing'?'missing':'dead'}">${r.status==='active'?'ACTIEF':r.status==='missing'?'ONTBREEKT':'DOOD'}</span>`;
  let secretBlock = "";
  if(r.secret_value){
    const id = "s"+String(r.id).slice(0,8);
    secretBlock = `<div class="secret">
      <div class="val masked" id="${id}" data-full="${esc(r.secret_value)}">${"•".repeat(Math.min(28,Math.max(8,r.secret_value.length)))}</div>
      <button class="iconbtn" data-reveal="${id}">${eyeSVG}<span>Toon</span></button>
      <button class="iconbtn" data-copy="${esc(r.secret_value)}">${copySVG}<span>Kopieer</span></button>
    </div>`;
  } else if(r.status==='missing'){
    secretBlock = `<div class="missing-note">Nog invullen — ${r.url?`<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(hostOf(r.url))} ↗</a>`:'zie notitie'}</div>`;
  }
  const metaBits = [ r.notes ? `<span class="note">${esc(r.notes)}</span>` : `<span></span>` ];
  if(r.url && r.secret_value) metaBits.push(`<span class="find"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(hostOf(r.url))} ↗</a></span>`);
  const meta = `<div class="meta">${metaBits.join("")}</div>`;

  return `<div class="row ${r.status==='dead'?'dead':''}">
    <div class="row-top">
      <div class="row-name"><div class="eyebrow">${esc(r.service)}</div><div class="key">${esc(r.key_name||"—")}</div></div>${badge}
    </div>${secretBlock}${meta}
  </div>`;
}

function bindReveal(btn){
  btn.onclick = ()=>{
    const el = document.getElementById(btn.dataset.reveal);
    if(el.classList.contains("masked")){ el.classList.remove("masked"); el.textContent = el.dataset.full; btn.querySelector("span").textContent="Verberg"; }
    else { el.classList.add("masked"); el.textContent = "•".repeat(Math.min(28,Math.max(8,el.dataset.full.length))); btn.querySelector("span").textContent="Toon"; }
  };
}
function bindCopy(btn){
  btn.onclick = async ()=>{
    try{ await navigator.clipboard.writeText(btn.dataset.copy); }catch{}
    btn.classList.add("copied"); const s=btn.querySelector("span"); const t=s.textContent; s.textContent="Gekopieerd";
    setTimeout(()=>{ btn.classList.remove("copied"); s.textContent=t; }, 1200);
  };
}

const lockSVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
const searchSVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>`;
const eyeSVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
const copySVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>`;

boot();
</script>
</body>
</html>
