<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEWI - KPI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="dewi-config.js"></script>
<style>
  :root{
    --bg:#04070d; --panel:#0d1420; --line:#1c2940;
    --cyan:#00d4ff; --blue:#3da5ff; --green:#4fd1a1; --orange:#e67e22;
    --red:#ff5d5d; --yellow:#ffd400; --muted:#7d8ca3; --text:#dfe8f5;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font:14px/1.45 "Segoe UI",system-ui,-apple-system,sans-serif;
    display:flex;flex-direction:column;overflow:hidden}
  a{color:var(--cyan);text-decoration:none}

  /* ---- cockpit-balk: alleen hier worden panelen aan/uit gezet ---- */
  #top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:9px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex:none}
  #top .brand{font-weight:900;letter-spacing:.28em;color:var(--cyan);font-size:14px;
    display:inline-flex;align-items:center;gap:9px}
  #top .brand .live{width:9px;height:9px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green);animation:pulse 1.6s ease-in-out infinite}
  #top .brand .byrick{color:var(--yellow);font-size:10px;letter-spacing:.08em;font-weight:800}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  #top .grp{display:flex;gap:6px;align-items:center}
  #top .lbl{color:var(--muted);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  #top button{background:none;border:1px solid var(--line);color:var(--muted);
    border-radius:6px;padding:4px 11px;cursor:pointer;font:inherit;font-size:12px;
    letter-spacing:.05em}
  #top button:hover{color:var(--text)}
  #top button.on{border-color:var(--cyan);color:var(--cyan)}
  #top #stamp{margin-left:auto;color:var(--muted);font-size:12px;
    font-family:ui-monospace,Consolas,monospace}

  /* ---- werkvlak: KPI links (vast), panelen rechts ---- */
  #work{flex:1;display:flex;min-height:0}
  #kpiScroll{flex:1 1 0;min-width:380px;overflow-y:auto;padding:16px}
  .sidepane{position:relative;min-width:280px;display:flex}
  .sidepane iframe{flex:1;width:100%;border:none;background:var(--bg)}
  .divider{width:6px;cursor:col-resize;background:var(--line);flex:none;transition:background .15s}
  .divider:hover,.divider.drag{background:var(--cyan)}

  /* ---- KPI-inhoud ---- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-bottom:14px}
  .card h2{margin:0 0 12px;font-size:12px;letter-spacing:.18em;color:var(--muted);
    text-transform:uppercase;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .card h2 .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .card h2 .when{font-weight:400;letter-spacing:0;text-transform:none}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .row3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
  .row2 .card,.row3 .card{margin-bottom:0}
  @media (max-width:1100px){ .row2{grid-template-columns:1fr} }

  .nums{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:10px}
  .num .v{font-size:25px;font-weight:800;line-height:1.05}
  .num .l{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
  .d{font-size:11px;font-weight:700;margin-left:4px}
  .d.up{color:var(--green)} .d.down{color:var(--red)} .d.flat{color:var(--muted)}
  .warnval{color:var(--orange)} .badval{color:var(--red)} .goodval{color:var(--green)}

  .chart{position:relative}
  .chart svg{display:block;width:100%;height:auto}
  .chart .tip{position:absolute;pointer-events:none;display:none;z-index:5;
    background:#0d1420;border:1px solid var(--cyan);border-radius:8px;
    padding:7px 10px;font-size:11px;line-height:1.6;white-space:nowrap;
    box-shadow:0 4px 14px rgba(0,0,0,.5)}
  .chart .tip b{color:var(--cyan)}
  .chart .tip i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px}
  .chart .guide{position:absolute;top:4px;bottom:20px;width:1px;
    background:rgba(0,212,255,.45);pointer-events:none;display:none}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;font-size:11px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:10px;height:10px;border-radius:2px;display:inline-block}

  #memos .memo{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;
    padding:9px 0;border-bottom:1px solid var(--line)}
  #memos .memo:last-child{border-bottom:none}
  #memos .t{font-weight:600}
  #memos .n{font-size:12px;color:var(--muted);margin-top:2px}
  .pill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:99px;white-space:nowrap}
  .sys-sep{margin:12px 0 6px;padding-top:9px;border-top:1px dashed var(--line);
    font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .sys-muted{opacity:.62}
  .sys-muted i{font-style:normal;color:var(--muted);font-size:11px}
  .pill.red{background:rgba(255,93,93,.15);color:var(--red)}
  .pill.orange{background:rgba(230,126,34,.15);color:var(--orange)}
  .pill.grey{background:rgba(125,140,163,.12);color:var(--muted)}
  .pill.green{background:rgba(79,209,161,.15);color:var(--green)}

  .kv{display:flex;justify-content:space-between;padding:7px 0;
    border-bottom:1px solid var(--line);font-size:13px}
  .kv:last-child{border-bottom:none}

  #login{max-width:420px;margin:80px auto;text-align:center;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:30px}
  .hidden{display:none}
  #err{color:var(--red);font-size:12px;margin-top:14px;white-space:pre-wrap}

  /* mobiel: alleen KPI, paneelknoppen verbergen (naast elkaar is zinloos op telefoon) */
  @media (max-width:820px){
    #top .grp{display:none}
    .sidepane,.divider{display:none !important}
    #kpiScroll{min-width:0;padding:10px}
    .nums{gap:18px} .num .v{font-size:22px}
  }
</style>
</head>
<body>

<div id="login" class="hidden">
  <div style="color:var(--cyan);font-weight:900;letter-spacing:.28em">DEWI</div>
  <p style="color:var(--muted)">Geen actieve sessie. Log eerst in via het hoofdscherm.</p>
  <p><a href="organisation.html">Naar login</a></p>
</div>

<div id="top" class="hidden">
  <span class="brand"><span class="live"></span>DEWI<span class="byrick">by Rick</span></span>
  <span class="grp"><span class="lbl">Panels</span></span>
  <span id="stamp"></span>
</div>

<div id="work" class="hidden">
  <div id="kpiScroll">
    <div class="card">
      <h2><span class="dot" style="background:var(--cyan)"></span>Website (GA4)
        <span class="when" id="web-when"></span></h2>
      <div class="nums" id="web-nums"></div>
      <div class="chart" id="web-chart"></div>
      <div class="legend"><span><i style="background:var(--cyan)"></i>Sessies</span>
        <span><i style="background:var(--blue)"></i>Gebruikers</span></div>
    </div>

    <div class="row2">
      <div class="card">
        <h2><span class="dot" style="background:var(--yellow)"></span>Shop (Shopify)
          <span class="when" id="shop-when"></span></h2>
        <div class="nums" id="shop-nums"></div>
        <div class="chart" id="shop-chart"></div>
        <div class="legend"><span><i style="background:var(--yellow)"></i>Orders</span>
          <span><i style="background:var(--green)"></i>Omzet (&euro;)</span></div>
      </div>
      <div class="card">
        <h2><span class="dot" style="background:var(--green)"></span>Social (Meta)
          <span class="when" id="social-when"></span></h2>
        <div class="nums" id="social-nums"></div>
        <div class="chart" id="social-chart"></div>
        <div class="legend"><span><i style="background:var(--green)"></i>IG volgers</span></div>
      </div>
    </div>
    <div style="height:14px"></div>

    <div class="card">
      <h2><span class="dot" style="background:var(--blue)"></span>Paid Ads (Meta)
        <span class="when" id="ads-when"></span></h2>
      <div class="nums" id="ads-nums"></div>
      <div class="row2">
        <div>
          <div class="chart" id="ads-chart-spend"></div>
          <div class="legend"><span><i style="background:var(--blue)"></i>Spend per day (&euro;)</span></div>
        </div>
        <div>
          <div class="chart" id="ads-chart-reach"></div>
          <div class="legend"><span><i style="background:var(--cyan)"></i>Impressions</span>
            <span><i style="background:var(--yellow)"></i>Link clicks</span></div>
        </div>
      </div>
      <p id="ads-foot" style="color:var(--muted);font-size:11px;margin:10px 0 0"></p>
    </div>
    <div style="height:0"></div>

    <div class="row3">
      <div class="card">
        <h2><span class="dot" style="background:var(--orange)"></span>To-do's (DEWI)
          <span class="when" id="memo-count"></span></h2>
        <div id="memos"></div>
      </div>
      <div class="card">
        <h2><span class="dot" style="background:var(--red)"></span>Systeem &mdash; stilte-detectie</h2>
        <div id="system"></div>
      </div>
    </div>
    <div id="err"></div>
  </div>
</div>

<script>
(function(){
  var CFG = window.DEWI_CONFIG || (typeof BRIDGE_CONFIG !== 'undefined' && BRIDGE_CONFIG) || window.BRIDGE_CONFIG || {};
  var SB_URL = CFG.SUPABASE_URL
    || (typeof SUPABASE_URL !== 'undefined' ? SUPABASE_URL : null)
    || window.SUPABASE_URL || 'https://jucubuoftjehwancegma.supabase.co';
  var SB_KEY = CFG.SUPABASE_ANON_KEY
    || (typeof SUPABASE_ANON_KEY !== 'undefined' ? SUPABASE_ANON_KEY : null)
    || window.SUPABASE_ANON_KEY || '';
  if(!SB_KEY){ document.body.innerHTML =
    '<div id="login"><p style="color:#ff5d5d">dewi-config.js niet gevonden of anon key ontbreekt.</p></div>'; return; }

  var sb = supabase.createClient(SB_URL, SB_KEY);
  var $ = function(id){ return document.getElementById(id); };
  var fmt = function(n){ return Number(n).toLocaleString('nl-NL'); };
  var CLR = { cyan:'#00d4ff', blue:'#3da5ff', green:'#4fd1a1', red:'#ff5d5d',
              yellow:'#ffd400', muted:'#7d8ca3', grid:'#1c2940' };

  /* ================= secundaire panelen (volgorde = knopvolgorde) ================= */
  var PANELS = [
    { id:'org',           label:'ORGANISATION',  url:'organisation.html', title:'ORGANISATION',  clickView:'organigram' },
    { id:'agents',        label:'AGENTS',        url:'agents.html',      title:'AGENTS' },
    { id:'creds',         label:'CREDENTIALS',   url:'credentials.html', title:'CREDENTIALS' },
    { id:'constellation', label:'CONSTELLATION', url:'organisation.html', title:'CONSTELLATION', clickView:'constellation' },
    { id:'comp',          label:'COMPETITION',   url:'competition.html',  title:'COMPETITION' }
  ];
  var state = { open:{}, widths:{} };   // widths in % van het werkvlak
  try{
    var s = JSON.parse(localStorage.getItem('dewi_kpi_panels')||'{}');
    if(s && typeof s === 'object'){ state.open = s.open||{}; state.widths = s.widths||{}; }
  }catch(e){}
  function saveState(){
    try{ localStorage.setItem('dewi_kpi_panels', JSON.stringify(state)); }catch(e){}
  }

  var work = $('work'), grp = document.querySelector('#top .grp');
  var btns = {};

  PANELS.forEach(function(p){
    var b = document.createElement('button');
    b.textContent = p.label;
    b.addEventListener('click', function(){ togglePanel(p.id); });
    grp.appendChild(b);
    btns[p.id] = b;
  });

  function buildPanes(){
    // verwijder bestaande sidepanes + dividers
    [].slice.call(work.querySelectorAll('.sidepane,.divider')).forEach(function(el){ el.remove(); });
    PANELS.forEach(function(p){
      btns[p.id].classList.toggle('on', !!state.open[p.id]);
      if(!state.open[p.id]) return;
      var div = document.createElement('div');
      div.className = 'divider';
      var pane = document.createElement('div');
      pane.className = 'sidepane';
      pane.dataset.pid = p.id;
      pane.style.flex = '0 0 ' + (state.widths[p.id] || 30) + '%';
      var f = document.createElement('iframe');
      f.src = p.url; f.title = p.label;
      f.addEventListener('load', function(){ dressPanel(f, p); });
      pane.appendChild(f);
      work.appendChild(div);
      work.appendChild(pane);
      attachDrag(div, pane, p.id);
    });
  }

  function togglePanel(id){
    state.open[id] = !state.open[id];
    if(state.open[id] && !state.widths[id]) state.widths[id] = 30;
    saveState();
    buildPanes();
  }

  // Cockpit kleedt elk paneel aan: interne navigatie weg, titel hernoemen,
  // en waar nodig de juiste weergave aanklikken (organigram/constellation).
  var norm = function(t){ return (t||'').toUpperCase().replace(/[^A-Z]/g,''); };

  function hideNav(doc){
    var labels = ['overzicht','agents','concurrentie'];
    var all = doc.body.getElementsByTagName('*');
    var best = null, bestLen = Infinity;
    for(var i = 0; i < all.length; i++){
      var t = (all[i].textContent || '').toLowerCase();
      if(t.length > 400) continue;
      var hits = 0;
      for(var j = 0; j < labels.length; j++){ if(t.indexOf(labels[j]) !== -1) hits++; }
      if(hits === labels.length && t.length < bestLen){ best = all[i]; bestLen = t.length; }
    }
    if(best) best.style.display = 'none';
  }

  function rebrand(doc, title){
    // kleinste element waarvan de genormaliseerde tekst met THEBRIDGE begint
    var all = doc.body.getElementsByTagName('*');
    var best = null, bestLen = Infinity;
    for(var i = 0; i < all.length; i++){
      var n = norm(all[i].textContent);
      if(n.indexOf('DEWI') === 0 && n.length < 25 && n.length < bestLen){
        best = all[i]; bestLen = n.length;
      }
    }
    if(best){
      best.textContent = title;
      best.style.color = '#00d4ff';                        // zelfde blauw als AGENTS
      // tekstloze buurtjes (zoals het groene lampje) verbergen
      if(best.parentElement){
        var sibs = best.parentElement.children;
        for(var s = 0; s < sibs.length; s++){
          if(sibs[s] !== best && norm(sibs[s].textContent) === ''){
            sibs[s].style.display = 'none';
          }
        }
      }
    }
    // buurtjes van het merkje ook opruimen: alleen de paneelnaam blijft over
    var extras = ['BYRICK', 'COMMANDCENTER'];
    for(var k = 0; k < extras.length; k++){
      var target = null, tLen = Infinity;
      for(var m = 0; m < all.length; m++){
        var nn = norm(all[m].textContent);
        if(nn === extras[k] && nn.length < tLen){ target = all[m]; tLen = nn.length; }
      }
      if(target) target.style.display = 'none';
    }
    return best;
  }

  // Command-Center-chroom strippen: live-regel, weergaveknoppen, DEPS en EXIT.
  // Weergaveknoppen alleen als klikbaar element verbergen zodat de paneeltitel
  // (die 'CONSTELLATION' kan heten) blijft staan.
  function hideExtras(doc, titleEl){
    var all = doc.body.getElementsByTagName('*');
    var liveKill = ['LIVEHOMEDECOBALI', 'VERBINDEN', 'VERBINDINGMISLUKT'];
    for(var k2 = 0; k2 < liveKill.length; k2++){
      var target = null, tLen = Infinity;
      for(var i = 0; i < all.length; i++){
        var n = norm(all[i].textContent);
        if(n === liveKill[k2] && n.length < tLen){ target = all[i]; tLen = n.length; }
      }
      if(target) target.style.display = 'none';
    }
    var kill = ['CONSTELLATION', 'ORGANIGRAM', 'DEPS', 'EXIT'];
    var clickables = doc.body.querySelectorAll('button, [role="button"], a');
    for(var c = 0; c < clickables.length; c++){
      var el = clickables[c];
      if(el === titleEl) continue;
      if(kill.indexOf(norm(el.textContent)) !== -1) el.style.display = 'none';
    }
  }

  function clickView(doc, view){
    var want = norm(view);
    var all = doc.body.querySelectorAll('button, [role="button"], a');
    for(var i = 0; i < all.length; i++){
      if(norm(all[i].textContent) === want){ all[i].click(); return; }
    }
  }

  function dressPanel(frame, p){
    var pass = function(){
      try{
        var doc = frame.contentDocument;
        if(!doc || !doc.body) return;
        hideNav(doc);
        if(p.clickView) clickView(doc, p.clickView);
        var titleEl = null;
        if(p.title) titleEl = rebrand(doc, p.title);
        if(p.clickView) hideExtras(doc, titleEl);   // alleen Command-Center-panelen
      }catch(e){ /* nooit de cockpit laten breken op een paneel */ }
    };
    // meerdere passes: pagina-JS rendert soms na load nog door
    setTimeout(pass, 300);
    setTimeout(pass, 1200);
    setTimeout(pass, 3000);
  }

  function attachDrag(divider, pane, pid){
    divider.addEventListener('pointerdown', function(e){
      e.preventDefault(); divider.classList.add('drag');
      var total = work.clientWidth;
      var startX = e.clientX;
      var startPct = state.widths[pid] || 30;
      function move(ev){
        // divider zit links van het paneel: naar links slepen = paneel breder
        var dPct = (startX - ev.clientX) / total * 100;
        var w = Math.min(70, Math.max(12, startPct + dPct));
        state.widths[pid] = w;
        pane.style.flex = '0 0 ' + w + '%';
      }
      function up(){
        divider.classList.remove('drag'); saveState();
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
      }
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    });
  }

  /* ================= helpers cijfers & diagrammen ================= */
  function delta(cur, prev){
    if(prev === null || prev === undefined || prev === 0) return '';
    var d = ((cur - prev) / prev) * 100;
    var cls = d > 0.5 ? 'up' : (d < -0.5 ? 'down' : 'flat');
    var arr = d > 0.5 ? '\u25B2' : (d < -0.5 ? '\u25BC' : '\u25CF');
    return '<span class="d '+cls+'">'+arr+' '+Math.abs(d).toFixed(0)+'%</span>';
  }
  function num(label, value, deltaHtml, cls){
    return '<div class="num"><div class="v '+(cls||'')+'">'+value+(deltaHtml||'')+'</div>'
      + '<div class="l">'+label+'</div></div>';
  }
  function dayLabel(iso){ return iso.slice(8,10) + '/' + iso.slice(5,7); }
  function niceMax(v){
    if(v <= 10) return 10;
    var mag = Math.pow(10, Math.floor(Math.log10(v)));
    var n = v / mag;
    var nice = n <= 1 ? 1 : n <= 2 ? 2 : n <= 2.5 ? 2.5 : n <= 5 ? 5 : 10;
    return nice * mag;
  }

  function lineChart(dates, seriesList, height){
    var w = 900, h = height || 240, padL = 46, padR = 10, padT = 12, padB = 26;
    var iW = w - padL - padR, iH = h - padT - padB;
    var max = 1;
    seriesList.forEach(function(s){ s.values.forEach(function(v){ if(v > max) max = v; }); });
    max = niceMax(max);
    var n = dates.length;
    var X = function(i){ return padL + (n <= 1 ? iW/2 : i * (iW / (n-1))); };
    var Y = function(v){ return padT + iH - (v / max) * iH; };
    var svg = '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet">';
    for(var g = 0; g <= 4; g++){
      var gv = max * g / 4, gy = Y(gv);
      svg += '<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(w-padR)+'" y2="'+gy.toFixed(1)
        + '" stroke="'+CLR.grid+'" stroke-width="1"/>'
        + '<text x="'+(padL-8)+'" y="'+(gy+4).toFixed(1)+'" text-anchor="end" font-size="11" fill="'+CLR.muted+'">'
        + fmt(Math.round(gv)) + '</text>';
    }
    var step = Math.max(1, Math.ceil(n / 8));
    for(var i = 0; i < n; i += step){
      svg += '<text x="'+X(i).toFixed(1)+'" y="'+(h-8)+'" text-anchor="middle" font-size="11" fill="'+CLR.muted+'">'
        + dayLabel(dates[i]) + '</text>';
    }
    seriesList.forEach(function(s){
      var d = '';
      s.values.forEach(function(v, i){ d += (i ? ' L' : 'M') + X(i).toFixed(1) + ' ' + Y(v).toFixed(1); });
      if(s.fill){
        svg += '<path d="'+d+' L'+X(n-1).toFixed(1)+' '+Y(0).toFixed(1)+' L'+X(0).toFixed(1)+' '+Y(0).toFixed(1)
          + ' Z" fill="'+s.color+'" opacity="0.08"/>';
      }
      svg += '<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="2.4" stroke-linejoin="round"/>';
      var lv = s.values[n-1];
      svg += '<circle cx="'+X(n-1).toFixed(1)+'" cy="'+Y(lv).toFixed(1)+'" r="3.5" fill="'+s.color+'"/>';
    });
    return svg + '</svg>';
  }

  function barChart(dates, groups, lineSeries, height){
    var w = 900, h = height || 240, padL = 46, padR = 10, padT = 12, padB = 26;
    var iW = w - padL - padR, iH = h - padT - padB;
    var max = 1;
    groups.forEach(function(s){ s.values.forEach(function(v){ if(v > max) max = v; }); });
    if(lineSeries) lineSeries.values.forEach(function(v){ if(v > max) max = v; });
    max = niceMax(max);
    var n = dates.length, slot = iW / n, bw = (slot * 0.66) / groups.length;
    var Y = function(v){ return padT + iH - (v / max) * iH; };
    var svg = '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet">';
    for(var g = 0; g <= 4; g++){
      var gv = max * g / 4, gy = Y(gv);
      svg += '<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(w-padR)+'" y2="'+gy.toFixed(1)
        + '" stroke="'+CLR.grid+'" stroke-width="1"/>'
        + '<text x="'+(padL-8)+'" y="'+(gy+4).toFixed(1)+'" text-anchor="end" font-size="11" fill="'+CLR.muted+'">'
        + fmt(Math.round(gv)) + '</text>';
    }
    var step = Math.max(1, Math.ceil(n / 8));
    for(var i = 0; i < n; i += step){
      svg += '<text x="'+(padL + i*slot + slot/2).toFixed(1)+'" y="'+(h-8)
        + '" text-anchor="middle" font-size="11" fill="'+CLR.muted+'">' + dayLabel(dates[i]) + '</text>';
    }
    groups.forEach(function(s, si){
      s.values.forEach(function(v, i){
        var x = padL + i*slot + (slot - bw*groups.length)/2 + si*bw;
        var y = Y(v), bh = padT + iH - y;
        if(bh < 1 && v > 0) { bh = 1; y = padT + iH - 1; }
        svg += '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(bw-1).toFixed(1)
          + '" height="'+bh.toFixed(1)+'" rx="1.5" fill="'+s.color+'"/>';
      });
    });
    if(lineSeries){
      var d = '';
      lineSeries.values.forEach(function(v, i){
        var x = padL + i*slot + slot/2;
        d += (i ? ' L' : 'M') + x.toFixed(1) + ' ' + Y(v).toFixed(1);
      });
      svg += '<path d="'+d+'" fill="none" stroke="'+lineSeries.color
        + '" stroke-width="2" stroke-dasharray="4 3"/>';
      lineSeries.values.forEach(function(v, i){
        if(v <= 0) return;
        var x = padL + i*slot + slot/2;
        svg += '<circle cx="'+x.toFixed(1)+'" cy="'+Y(v).toFixed(1)+'" r="3" fill="'+lineSeries.color+'"/>';
      });
    }
    return svg + '</svg>';
  }

  // ---------- hover: tooltip + hulplijn op elke grafiek ----------
  // series: [{label, values, color, format?}] - format is optionele functie op de waarde
  function hookHover(el, dates, series, isBars){
    if(!el || !dates || dates.length < 2) return;
    var tip = document.createElement('div'); tip.className = 'tip';
    var guide = document.createElement('div'); guide.className = 'guide';
    el.appendChild(guide); el.appendChild(tip);
    var W = 900, padL = 46, padR = 10, n = dates.length;
    var iW = W - padL - padR;
    var slot = iW / n, stepX = iW / (n - 1);
    var xOf = function(i){ return isBars ? (padL + i * slot + slot / 2) : (padL + i * stepX); };
    var idxOf = function(viewX){
      var i = isBars ? Math.floor((viewX - padL) / slot) : Math.round((viewX - padL) / stepX);
      if(i < 0) i = 0; if(i > n - 1) i = n - 1; return i;
    };
    el.onmousemove = function(e){
      var svg = el.querySelector('svg'); if(!svg) return;
      var rect = svg.getBoundingClientRect();
      var viewX = (e.clientX - rect.left) / rect.width * W;
      var i = idxOf(viewX);
      var cssX = xOf(i) / W * rect.width;
      guide.style.left = cssX + 'px'; guide.style.display = 'block';
      var html = '<b>' + dayLabel(dates[i]) + '</b>';
      for(var s = 0; s < series.length; s++){
        var sr = series[s], v = sr.values[i];
        html += '<br><i style="background:' + sr.color + '"></i>' + sr.label + ': <b style="color:#dfe8f5">'
          + (sr.format ? sr.format(v) : fmt(v)) + '</b>';
      }
      tip.innerHTML = html;
      tip.style.display = 'block';
      var tw = tip.offsetWidth, left = cssX + 12;
      if(left + tw > el.clientWidth) left = cssX - tw - 12;
      tip.style.left = Math.max(0, left) + 'px';
      tip.style.top = '6px';
    };
    el.onmouseleave = function(){ tip.style.display = 'none'; guide.style.display = 'none'; };
  }
  var eur2 = function(v){ return '\u20AC' + Number(v || 0).toFixed(2); };
  var pct1 = function(v){ return Number(v || 0).toFixed(1) + '%'; };

  function pivot(rows, source){
    var out = {};
    rows.forEach(function(r){
      if(r.source !== source) return;
      (out[r.kpi_date] = out[r.kpi_date] || {})[r.metric] = Number(r.value);
    });
    return out;
  }
  function lastDates(byDate, days){ return Object.keys(byDate).sort().slice(-days); }
  function vals(byDate, dates, metric){
    return dates.map(function(d){ return (byDate[d] || {})[metric] || 0; });
  }
  function lastTwo(byDate){
    var ds = Object.keys(byDate).sort();
    return { lastDate: ds[ds.length-1] || null,
             last: byDate[ds[ds.length-1]] || {}, prev: byDate[ds[ds.length-2]] || {} };
  }

  /* ================= data laden ================= */
  async function load(){
    var errEl = $('err'); errEl.textContent = '';
    try{
      var res = await Promise.all([
        sb.from('bridge_kpi_daily').select('*'),
        sb.from('bridge_memos').select('*'),
        sb.from('bridge_agent_silence').select('*'),
        sb.from('bridge_ads_summary').select('*')
      ]);
      if(res[0].error) throw res[0].error;
      var kpi = res[0].data || [], memos = res[1].data || [],
          sil = res[2].data || [], adsArr = res[3].data || [];
      var ads = adsArr[0] || null;

      var web = pivot(kpi, 'ga4'); var wd = lastDates(web, 28); var wl = lastTwo(web);
      $('web-when').textContent = wl.lastDate ? '\u2014 laatste 28 dagen, t/m ' + wl.lastDate : '';
      $('web-nums').innerHTML =
        num('sessies gisteren', fmt(wl.last.sessions||0), delta(wl.last.sessions, wl.prev.sessions)) +
        num('gebruikers', fmt(wl.last.users||0), delta(wl.last.users, wl.prev.users)) +
        num('weergaven', fmt(wl.last.pageviews||0), delta(wl.last.pageviews, wl.prev.pageviews)) +
        num('engagement', (wl.last.engagement_rate||0) + '%', delta(wl.last.engagement_rate, wl.prev.engagement_rate)) +
        num('nieuwe gebruikers', fmt(wl.last.new_users||0), '');
      $('web-chart').innerHTML = lineChart(wd, [
        { values: vals(web, wd, 'sessions'), color: CLR.cyan, fill: true },
        { values: vals(web, wd, 'users'), color: CLR.blue }
      ], 250);
      hookHover($('web-chart'), wd, [
        { label: 'Sessies', values: vals(web, wd, 'sessions'), color: CLR.cyan },
        { label: 'Gebruikers', values: vals(web, wd, 'users'), color: CLR.blue },
        { label: 'Weergaven', values: vals(web, wd, 'pageviews'), color: CLR.muted }
      ]);

      var shop = pivot(kpi, 'shopify'); var shd = lastDates(shop, 14); var shl = lastTwo(shop);
      $('shop-when').textContent = shl.lastDate ? '\u2014 14 dagen, t/m ' + shl.lastDate : '';
      $('shop-nums').innerHTML =
        num('omzet gisteren', eur2(shl.last.revenue||0), delta(shl.last.revenue, shl.prev.revenue)) +
        num('orders', fmt(shl.last.orders||0), delta(shl.last.orders, shl.prev.orders)) +
        num('AOV', eur2(shl.last.aov||0), '') +
        num('nieuwe klanten', fmt(shl.last.new_customers||0), '');
      $('shop-chart').innerHTML = barChart(shd, [
        { values: vals(shop, shd, 'orders'), color: CLR.yellow }
      ], { values: vals(shop, shd, 'revenue'), color: CLR.green }, 230);
      hookHover($('shop-chart'), shd, [
        { label: 'Orders', values: vals(shop, shd, 'orders'), color: CLR.yellow },
        { label: 'Omzet', values: vals(shop, shd, 'revenue'), color: CLR.green, format: eur2 },
        { label: 'AOV', values: vals(shop, shd, 'aov'), color: CLR.muted, format: eur2 }
      ], true);

      var soc = pivot(kpi, 'meta_social'); var sd = lastDates(soc, 28); var sl = lastTwo(soc);
      var igNow = sl.last.ig_followers||0, igPrev = sl.prev.ig_followers;
      var igD = (igPrev !== undefined) ? igNow - igPrev : null;
      $('social-when').textContent = sl.lastDate ? '\u2014 stand ' + sl.lastDate : '';
      $('social-nums').innerHTML =
        num('IG volgers', fmt(igNow), igD === null ? '' :
          '<span class="d '+(igD>0?'up':(igD<0?'down':'flat'))+'">'+(igD>=0?'+':'')+igD+'</span>') +
        num('IG posts', fmt(sl.last.ig_media_count||0), '') +
        num('FB volgers', fmt(sl.last.fb_followers||0), '') +
        num('FB fans', fmt(sl.last.fb_fans||0), '');
      if(sd.length >= 2){
        $('social-chart').innerHTML = lineChart(sd, [
          { values: vals(soc, sd, 'ig_followers'), color: CLR.green, fill: true }
        ], 230);
        hookHover($('social-chart'), sd, [
          { label: 'IG volgers', values: vals(soc, sd, 'ig_followers'), color: CLR.green },
          { label: 'FB volgers', values: vals(soc, sd, 'fb_followers'), color: CLR.blue }
        ]);
      } else {
        $('social-chart').innerHTML = '<p style="color:var(--muted);font-size:12px;margin:30px 0">'
          + 'Groeigrafiek verschijnt zodra er meerdere dagen historie is &mdash; volger-aantallen zijn '
          + 'alleen als dagelijkse snapshot beschikbaar (opbouw gestart 10 juli).</p>';
      }

      // ---- PAID ADS (META) ----
      var pad = pivot(kpi, 'meta_ads'); var ad28 = lastDates(pad, 28); var pl = lastTwo(pad);
      $('ads-when').textContent = pl.lastDate ? '\u2014 last 28 days, t/m ' + pl.lastDate : '';
      var spend30 = 0, likes30 = 0;
      Object.keys(pad).forEach(function(d){
        spend30 += (pad[d].spend || 0); likes30 += (pad[d].page_likes || 0);
      });
      $('ads-nums').innerHTML =
        num('spend (' + (pl.lastDate ? pl.lastDate.slice(5) : 'last day') + ')',
            '\u20AC' + (pl.last.spend || 0).toFixed(2), delta(pl.last.spend, pl.prev.spend)) +
        num('spend 30d', '\u20AC' + spend30.toFixed(2), '') +
        num('impressions', fmt(pl.last.impressions || 0), delta(pl.last.impressions, pl.prev.impressions)) +
        num('link clicks', fmt(pl.last.link_clicks || 0), '') +
        num('CTR', (pl.last.ctr || 0).toFixed(1) + '%', '') +
        num('CPC', '\u20AC' + (pl.last.cpc || 0).toFixed(2), '') +
        num('page likes 30d', fmt(likes30), '');
      if(ad28.length >= 2){
        $('ads-chart-spend').innerHTML = barChart(ad28, [
          { values: vals(pad, ad28, 'spend'), color: CLR.blue }
        ], null, 210);
        hookHover($('ads-chart-spend'), ad28, [
          { label: 'Spend', values: vals(pad, ad28, 'spend'), color: CLR.blue, format: eur2 },
          { label: 'CPC', values: vals(pad, ad28, 'cpc'), color: CLR.muted, format: eur2 },
          { label: 'CTR', values: vals(pad, ad28, 'ctr'), color: CLR.muted, format: pct1 }
        ], true);
        $('ads-chart-reach').innerHTML = lineChart(ad28, [
          { values: vals(pad, ad28, 'impressions'), color: CLR.cyan, fill: true },
          { values: vals(pad, ad28, 'link_clicks'), color: CLR.yellow }
        ], 210);
        hookHover($('ads-chart-reach'), ad28, [
          { label: 'Impressies', values: vals(pad, ad28, 'impressions'), color: CLR.cyan },
          { label: 'Link clicks', values: vals(pad, ad28, 'link_clicks'), color: CLR.yellow },
          { label: 'Page likes', values: vals(pad, ad28, 'page_likes'), color: CLR.green }
        ]);
      } else {
        $('ads-chart-spend').innerHTML = '<p style="color:var(--muted);font-size:12px;margin:20px 0">Geen delivery in de laatste 28 dagen.</p>';
        $('ads-chart-reach').innerHTML = '';
      }
      $('ads-foot').textContent = ads
        ? (fmt(ads.active_campaigns) + ' active campaigns \u00B7 ' + fmt(ads.pending_campaigns)
          + ' pending \u00B7 \u20AC' + Number(ads.active_daily_budget_eur).toFixed(2) + '/day budget \u00B7 '
          + fmt(ads.activated_30d) + ' activated (30d) \u00B7 last activation '
          + (ads.last_activation ? ads.last_activation.slice(0,10) : '\u2014')
          + ' \u00B7 per-campagne resultaten via ads_weekly_metrics')
        : '';

      var open = memos.slice().sort(function(a,b){ return (a.days_left||0) - (b.days_left||0); });
      $('memo-count').textContent = '('+open.length+' open)';
      $('memos').innerHTML = open.length ? open.map(function(mm){
        var cls = mm.overdue ? 'red' : (mm.in_warning_window ? 'orange' : 'grey');
        var lbl = mm.overdue ? (Math.abs(mm.days_left)+'d over tijd')
                : (mm.days_left === 0 ? 'vandaag' : 'nog '+mm.days_left+'d');
        var link = mm.related_url ? ' &middot; <a href="'+mm.related_url+'" target="_blank" rel="noopener">openen</a>' : '';
        return '<div class="memo"><div><div class="t">'+mm.title+'</div>'
          + '<div class="n">'+(mm.note||'')+link+'</div></div>'
          + '<div style="text-align:right"><span class="pill '+cls+'">'+lbl+'</span>'
          + '<div class="n">'+mm.due_date+'</div></div></div>';
      }).join('') : '<p style="color:var(--muted)">Geen open to-do\'s.</p>';

      // bewaakt = agent met vast schema; event-driven (webhook/on approve) is niet te bewaken
      var mon    = sil.filter(function(a){ return a.monitored; });
      var events = sil.filter(function(a){ return !a.monitored; });
      var silent = mon.filter(function(a){ return a.silent; });
      var failed = sil.filter(function(a){ return a.last_run_failed; });

      var sysHtml = '<div class="kv"><span>Bewaakte agents</span><b>'+mon.length+'</b></div>'
        + '<div class="kv"><span>Event-driven (niet bewaakt)</span><b>'+events.length+'</b></div>'
        + '<div class="kv"><span>Stille agents</span>'
        + (silent.length ? '<span class="pill red">'+silent.length+' STIL</span>'
                         : '<span class="pill green">0 &mdash; alles op schema</span>') + '</div>';
      if(failed.length){
        sysHtml += '<div class="kv"><span>Laatste run mislukt</span><span class="pill red">'+failed.length+'</span></div>';
      }
      silent.forEach(function(a){
        var since = (a.hours_since_last_run === null) ? 'nooit gedraaid'
                  : a.hours_since_last_run + 'u geleden (verwacht elke ' + a.expected_interval_hours + 'u)';
        sysHtml += '<div class="kv"><span style="color:var(--red)">'+a.agent_name+'</span><span>'+since+'</span></div>';
      });
      failed.forEach(function(a){
        sysHtml += '<div class="kv"><span style="color:var(--red)">'+a.agent_name+'</span><span>laatste run mislukt</span></div>';
      });

      // Event-driven agents: gedempt onder een streep. Geen alarm (een webhook die
      // niemand aanroept is niet kapot), maar wel zichtbaar zodat er geen blinde vlek ontstaat.
      if(events.length){
        sysHtml += '<div class="sys-sep">Niet bewaakt &mdash; vuren op een gebeurtenis, niet op een klok</div>';
        events.forEach(function(a){
          var last = (a.hours_since_last_run === null) ? 'nog nooit gedraaid'
                   : a.hours_since_last_run + 'u geleden';
          sysHtml += '<div class="kv sys-muted"><span>'+a.agent_name
                  + ' <i>&middot; '+(a.schedule_human||'')+'</i></span><span>'+last+'</span></div>';
        });
      }
      $('system').innerHTML = sysHtml;

      $('stamp').textContent = 'bijgewerkt ' + new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
    }catch(e){
      errEl.textContent = 'Fout bij laden: ' + (e.message || e);
    }
  }

  async function init(){
    var sess = await sb.auth.getSession();
    if(!sess.data.session){ $('login').classList.remove('hidden'); return; }
    $('top').classList.remove('hidden');
    $('work').classList.remove('hidden');
    buildPanes();
    load();
    setInterval(load, 5 * 60 * 1000);
    document.addEventListener('visibilitychange', function(){
      if(document.visibilityState === 'visible') load();
    });
  }
  init();
})();
</script>
</body>
